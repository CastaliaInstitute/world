<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>McShan Worldschool Workspace</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #151611;
        --panel: #1d1f19;
        --ink: #f5f1e8;
        --muted: #d8d0c1;
        --line: #57534e;
        --accent: #a7f3d0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at 15% 15%, rgba(49, 95, 86, 0.75), transparent 34rem),
          var(--bg);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        display: grid;
        align-content: center;
        max-width: 860px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      .eyebrow {
        color: var(--accent);
        font: 700 13px system-ui, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 24px;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 0.98;
      }

      p {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .gate {
        border: 1px solid var(--line);
        background: rgba(29, 31, 25, 0.92);
        padding: 24px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #d9f99d;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Authorization required</div>
      <h1>McShan Worldschool</h1>
      <section class="gate">
        <p>
          This workspace requires authentication and authorization. The private
          source repository is <code>CastaliaInstitute/castalia-family-mcshan</code>.
          No household content is embedded in this static placeholder.
        </p>
      </section>
    </main>
  </body>
</html>
